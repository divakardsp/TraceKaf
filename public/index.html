<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TraceKaf</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />
        <style>
            #map {
                height: 90vh;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>

        <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
        ></script>
        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io()
            let map = L.map("map").setView([25.07598, 72.877656], 6);
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution:
                    '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            }).addTo(map);

            function getCurrentLocation() {
                return new Promise((res, rej) => {
                    if ("geolocation" in navigator) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const latitude = position.coords.latitude;
                                const longitude = position.coords.longitude;
                                res({ latitude, longitude });
                            },
                            (err) => {
                                rej(err);
                            },
                            { enableHighAccuracy: true },
                        );
                    } else {
                        alert("Geolocation is not available in this browser");
                    }
                });
            }
            let userCurrentLocationMarker = null;
            async function main() {
                setInterval(async () => {
                    const userLocation = await getCurrentLocation();
                    socket.emit("client:location-update", {latitude: userLocation.latitude, longitude: userLocation.longitude})
                    if (!userCurrentLocationMarker) {
                        userCurrentLocationMarker = L.marker([
                            userLocation.latitude,
                            userLocation.longitude,
                        ]).addTo(map);
                    }else{
                        userCurrentLocationMarker.setLatLng([userLocation.latitude, userLocation.longitude]);
                    }
                }, 5* 1000);
            }

            window.addEventListener("load", main);
        </script>
    </body>
</html>
